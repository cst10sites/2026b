<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>HTML Assignment 4 App 1</title>
    <!--need to link to calc.css-->
    <link rel="stylesheet" href="calc.css">
  </head>
  <body>
    <div class="main">
      <h1>Tip Calculator</h1>
      <form>
        <label>subtoatal</label>
        <input type="text" id="subtotal" oninput="calculate()">
        <p id="firstOutput"></p>
        <!--rest of the input objects belong into one form-->
        <label>Select Tip Amount</label>
        <!-- id in select, value in option-->
        <select id="Tip" onchange="calculate()">
          <!--no input for dropdown-->
          <option value=".0">0%</option>
          <option value=".05">5%</option>
          <option value=".10">10%</option>
          <option value=".12">12%</option>
          <option value=".15">15%</option>
          <option value=".18">18%</option>
          <option value=".20">20%</option>
          <option value=".25">25%</option>
          <option value=".30">30%</option>
          <option value=".40">40%</option>
        </select>
        <br>
        <p id="tipOutput"></p>
        <label>Spilt</label>
        <!-- id in select, value in option-->
        <select id="spiltvalue" onchange="calculate()">
          <!--no input for dropdown-->
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <br>
        <p id="spiltOutput"></p>
        <br>
        <input type="reset" value="Reset" onclick="calculate()">
      </form>
      <br>
      <a href="reaction.html">Reaction Timer</a>
    </div>
    <!--need to move code to calc.js-->
    <script src="calc.js"></script>
  </body>
</html>
