<!DOCTYPE html>
<html lang="en">
<head>

	<title>Tip Calculator</title>

<body>
	<form>
	<div class="center-text">
	
	<h1>Tip Calculator</h1> 
	<h3>By: Liam</h3>
	<p>Subtotal</p>
	<form>
		<input type="text" id="subtotal">
		<!--rest of the input objects belong into one form-->
	</form>
		<p>+ GST(5%)</p>
		<p>After Tax Total:</p><p id="firstOutput"></p>

		<br> <br>
		<p>Tip</p>
		<select id="tipValue"><!--no input for dropdown-->

	    </select>

		<p>After Tip Total:</p>

			<br><br>

	        <option value="2">2</option>
	        <option value="3">3</option>
	        <option value="4">4</option>
	    </select>

		<p>After Tip Total:</p>
		<p id="splitOutput"></p>






	    <input type="button" value="Submit" onclick="calculate()">
